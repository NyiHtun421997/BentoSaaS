spring:
  application:
    name: plan-management-service
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: jdbc:postgresql://localhost:5432/bento_saas?currentSchema=planmanagement,public
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        type:
          json_format_mapper: jsonb

server:
  port: 4000
  servlet:
    context-path: /plan-management
