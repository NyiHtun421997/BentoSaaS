spring:
  application:
    name: plan-management-service
  messages:
    basename: messages
    encoding: UTF-8
  jpa:
    properties:
      hibernate:
        type:
          json_format_mapper: jackson
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      auto-offset-reset: earliest

server:
  port: 4000
  servlet:
    context-path: /plan-management

grpc:
  server:
    port: 9000

plan-management:
  scheduler-cron: "0 0 0 1 * ?"
  zone: Asia/Tokyo
  plan-changed-topic-name: plan-changed-topic
  user-subscription-topic-name: user-plan-subscription-topic
  plan-changed-notification-topic-name: plan-changed-notification-topic
  user-notification-topic-name: user-notification-topic
  group-id: plan-management-service
  outbox-scheduler-fixed-rate: 10000
  outbox-scheduler-initial-delay: 10000
