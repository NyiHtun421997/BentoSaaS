syntax = "proto3";

package subscription;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "subscription_grpc";

service SubscriptionService {
  rpc FetchActiveSubscriptions (InvoiceRequest) returns (SubscriptionResponse);
}

message InvoiceRequest {
  google.protobuf.Timestamp invoicing_event_time = 1;
}

message SubscriptionResponse {
  repeated Subscription subscriptions = 2;

  message Subscription {
    string subscription_id = 3;
    string plan_id = 4;
    string user_id = 5;
    string provided_user_id = 6;
    repeated string plan_meal_ids = 7;
  }
}