spring:
  jpa:
    open-in-view: false
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: invoice
    create-schemas: true
  datasource:
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.nyihtuun.bentosystem.invoiceservice: INFO

invoice:
  job-name: invoiceGeneration
  step-name: invoiceGenerationStep
  batch-chunk-size: 10
  job-param-issued-at: issuedAt
  job-param-run-id: runId

plan-management:
  service:
    address: ${PLAN_MANAGEMENT_SERVICE_ADDRESS}
    port: ${PLAN_MANAGEMENT_SERVICE_PORT}

subscription:
  service:
    address: ${SUBSCRIPTION_SERVICE_ADDRESS}
    port: ${SUBSCRIPTION_SERVICE_PORT}