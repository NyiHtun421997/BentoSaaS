spring:
  jpa:
    open-in-view: false
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: userinfo
    create-schemas: true
  datasource:
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.nyihtuun.bentosystem.userservice: INFO

aws:
  region: ${AWS_REGION}
  bucket-name: ${AWS_BUCKET_NAME}
  user-image-folder: bento_images/user/
  expiration-time-min: ${AWS_EXPIRATION_TIME_MIN}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-time: ${JWT_EXPIRATION_TIME}