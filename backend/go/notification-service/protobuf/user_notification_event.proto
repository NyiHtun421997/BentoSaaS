syntax = "proto3";
package notification_event;

option go_package = "nyihtuun.com/bentosystem/protobuf/notification_event";

import "google/protobuf/struct.proto";

message PlanManagementNotificationEvent {
  string user_id = 1;
  string plan_id = 2;
  string notification_event_type = 3;
  google.protobuf.Struct payload = 4;
}