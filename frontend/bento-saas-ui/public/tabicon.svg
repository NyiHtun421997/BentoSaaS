<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Bento App Icon">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="24" y="24" width="208" height="208" rx="56" fill="url(#g)" filter="url(#s)"/>

  <!-- bento container -->
  <rect x="64" y="88" width="128" height="104" rx="22" fill="#ffffff" opacity="0.96"/>
  <rect x="64" y="88" width="128" height="28" rx="22" fill="#ffffff" opacity="0.88"/>

  <!-- bento compartments -->
  <rect x="78" y="126" width="56" height="52" rx="14" fill="#0f172a" opacity="0.10"/>
  <rect x="142" y="126" width="36" height="24" rx="12" fill="#0f172a" opacity="0.10"/>
  <rect x="142" y="154" width="36" height="24" rx="12" fill="#0f172a" opacity="0.10"/>

  <!-- rice dots -->
  <circle cx="92" cy="144" r="4" fill="#0f172a" opacity="0.20"/>
  <circle cx="110" cy="156" r="4" fill="#0f172a" opacity="0.20"/>
  <circle cx="104" cy="170" r="4" fill="#0f172a" opacity="0.20"/>

  <!-- chopsticks -->
  <path d="M188 74c4 2 6 7 4 11l-28 64c-2 4-7 6-11 4s-6-7-4-11l28-64c2-4 7-6 11-4z"
        fill="#ffffff" opacity="0.92"/>
  <path d="M210 78c4 2 6 7 4 11l-32 74c-2 4-7 6-11 4s-6-7-4-11l32-74c2-4 7-6 11-4z"
        fill="#ffffff" opacity="0.78"/>
</svg>