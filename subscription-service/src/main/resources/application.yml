spring:
  application:
    name: subscription-service
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    url: jdbc:postgresql://localhost:5432/bento_saas?currentSchema=planmanagement,public
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

server:
  port: 4001
  servlet:
    context-path: /subscription

subscription:
  plan-management-service-url: http://localhost:4000/plan-management
  plan-management-api: api
  plan-management-version: v1
  plan-management-plan-details-path: plan
  connect-timeout-seconds: 5
  read-timeout-seconds: 5


resilience4j:
  circuit breaker:
    instances:
      plan-management-service:
        failureRateThreshold: 50
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2

  retry:
    instances:
      plan-management-service:
        maxAttempts: 3
        waitDuration: 300ms